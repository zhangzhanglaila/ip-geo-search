<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IPGeoSearch</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="nav-inner">
        <span class="logo-mark">IP</span>
        <strong>IPGeoSearch</strong>
        <span>IP查询</span>
        <span>在线Ping</span>
        <span>DNS查询</span>
        <span>网站分析</span>
      </div>
    </nav>

    <main class="shell">
      <section class="hero">
        <div class="hero-mascot" aria-hidden="true">
          <span class="mascot-ear left"></span>
          <span class="mascot-ear right"></span>
          <span class="mascot-face">
            <span class="mascot-eye left"></span>
            <span class="mascot-eye right"></span>
            <span class="mascot-mouth"></span>
          </span>
        </div>
        <h1>IP地址查询</h1>
        <p>快速查询 IP 地址的详细信息和风险评估</p>
        <form class="search-box" id="searchForm">
          <input
            id="ipInput"
            name="ip"
            autocomplete="off"
            spellcheck="false"
            value="117.151.83.202"
            aria-label="IP address"
            placeholder="请输入 IPv4 或 IPv6"
          />
          <button type="submit">立即查询</button>
        </form>
      </section>

      <section class="ip-cards">
        <article>
          <span class="dot green"></span>
          <span>我的 IPv4 地址</span>
          <strong id="ipv4Value">-</strong>
        </article>
        <article>
          <span class="dot blue"></span>
          <span>我的 IPv6 地址</span>
          <strong id="ipv6Value">未检测到 IPv6</strong>
        </article>
      </section>

      <section class="panel">
        <header><span>●</span><h2>基础信息</h2></header>
        <div class="info-grid">
          <div><span>IP 地址</span><strong id="basicIp">-</strong></div>
          <div><span>地理位置</span><strong id="basicLocation">-</strong></div>
          <div><span>ASN</span><strong id="basicAsn">-</strong></div>
          <div><span>运营商</span><strong id="basicIsp">-</strong></div>
          <div><span>经纬度</span><strong id="basicCoords">-</strong></div>
          <div><span>广播 IP</span><strong id="basicBroadcast">N/A</strong></div>
        </div>

        <div class="risk-card">
          <h3>欺诈风险评估</h3>
          <div class="risk-score" id="riskScore">0分</div>
          <div class="risk-bar"><span id="riskNeedle"></span></div>
          <strong id="riskSummary">极低风险 - 安全可信</strong>
          <p>基于本地 IP 数据库分析</p>
        </div>
      </section>

      <section class="panel">
        <header><span>●</span><h2>综合安全分析</h2></header>
        <table class="analysis-table">
          <thead>
            <tr>
              <th>来源</th>
              <th>代理</th>
              <th>服务器</th>
              <th>IP类型</th>
              <th>滥用</th>
            </tr>
          </thead>
          <tbody id="analysisBody"></tbody>
        </table>
      </section>

      <section class="panel map-panel">
        <header><span>●</span><h2>地理位置</h2></header>
        <div class="map-stage" aria-label="IP location map">
          <div id="mapCanvas" class="online-map"></div>
          <div class="map-badge" id="mapNote">查询 IP 后在地图中定位。</div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
